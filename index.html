    <style>
        :root {
            --navy: #070c18; --navy2: #0d1426; --navy3: #131d35;
            --blue: #2563eb; --blue2: #3b82f6; --blue-glow: rgba(37,99,235,.35);
            --gold: #f59e0b; --gold2: #fbbf24;
            --red: #ef4444; --green: #10b981; --purple: #7c3aed;
            --t1: #f1f5f9; --t2: #94a3b8; --t3: #64748b;
            --glass: rgba(255,255,255,.04); --border: rgba(255,255,255,.08);
        }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:radial-gradient(ellipse at 30% 20%,#0f1f40 0%,#000 70%); font-family:'Inter',sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
        #phone { width:390px; min-height:844px; background:var(--navy); border-radius:50px; border:2px solid #1e293b; box-shadow:0 60px 120px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.05),inset 0 1px 0 rgba(255,255,255,.08); position:relative; overflow:hidden; display:flex; flex-direction:column; }
        .sbar { height:50px; padding:14px 28px 0; display:flex; justify-content:space-between; align-items:center; font-size:12px; font-weight:600; color:var(--t1); flex-shrink:0; background:linear-gradient(180deg,rgba(37,99,235,.07),transparent); }
        #content { flex:1; overflow:hidden; position:relative; min-height:700px; }
        .screen { position:absolute; inset:0; overflow-y:auto; padding:20px 20px 100px; display:none; animation:su .3s cubic-bezier(.34,1.56,.64,1); scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
        .screen.active { display:block; }
        @keyframes su { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        #nav { height:88px; background:rgba(7,12,24,.96); backdrop-filter:blur(24px); border-top:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-around; padding-top:12px; flex-shrink:0; }
        .nb { background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--t3); font-size:9px; font-family:'Inter',sans-serif; font-weight:600; cursor:pointer; transition:.25s; padding:5px 8px; border-radius:14px; }
        .nb .ic { font-size:20px; transition:.25s; }
        .nb.active { color:var(--blue2); }
        .nb.active .ic { filter:drop-shadow(0 0 8px rgba(59,130,246,.7)); transform:scale(1.1); }
        .card { background:var(--glass); border:1px solid var(--border); border-radius:20px; padding:16px; margin-bottom:14px; position:relative; overflow:hidden; }
        .card::before { content:''; position:absolute; top:0;left:0;right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent); }
        .cb { border-color:rgba(37,99,235,.35); background:rgba(37,99,235,.07); }
        .cg2 { border-color:rgba(245,158,11,.3); background:rgba(245,158,11,.06); }
        .cr { border-color:rgba(239,68,68,.3); background:rgba(239,68,68,.07); }
        .cg { border-color:rgba(16,185,129,.3); background:rgba(16,185,129,.07); }
        .cp { border-color:rgba(124,58,237,.3); background:rgba(124,58,237,.07); }
        h1 { font-family:'Outfit',sans-serif; font-size:26px; font-weight:800; color:var(--t1); line-height:1.1; }
        h2 { font-family:'Outfit',sans-serif; font-size:21px; font-weight:700; color:var(--t1); }
        h3 { font-family:'Outfit',sans-serif; font-size:14px; font-weight:600; color:var(--t1); }
        .lbl { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); }
        .val { font-size:13px; font-weight:600; color:var(--t1); }
        .sub { font-size:11px; color:var(--t2); line-height:1.4; }
        .badge { display:inline-block; padding:3px 10px; border-radius:100px; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
        .br { background:rgba(239,68,68,.15); color:#fca5a5; border:1px solid rgba(239,68,68,.3); animation:pb 2s infinite; }
        .bg { background:rgba(16,185,129,.15); color:#6ee7b7; border:1px solid rgba(16,185,129,.3); }
        .bb { background:rgba(59,130,246,.15); color:#93c5fd; border:1px solid rgba(59,130,246,.3); }
        .bgd{ background:rgba(245,158,11,.15); color:#fcd34d; border:1px solid rgba(245,158,11,.3); }
        @keyframes pb { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)} 50%{box-shadow:0 0 0 5px rgba(239,68,68,0)} }
        .ring-w { position:relative; width:76px; height:76px; flex-shrink:0; }
        .ring-w svg { transform:rotate(-90deg); }
        .rbg { fill:none; stroke:#1e293b; stroke-width:5; }
        .rbar { fill:none; stroke:url(#rg); stroke-width:5; stroke-linecap:round; stroke-dasharray:213.63; stroke-dashoffset:149.54; }
        .rtext { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .ai-box { background:linear-gradient(135deg,rgba(37,99,235,.12),rgba(124,58,237,.08)); border:1px solid rgba(59,130,246,.4); border-radius:18px; padding:16px; animation:ag 3.5s ease-in-out infinite; margin-bottom:14px; }
        @keyframes ag { 0%,100%{box-shadow:0 0 12px rgba(59,130,246,.15);border-color:rgba(59,130,246,.4)} 50%{box-shadow:0 0 30px rgba(59,130,246,.35),0 0 8px rgba(124,58,237,.25);border-color:rgba(124,58,237,.5)} }
        .ai-chip { background:linear-gradient(90deg,#2563eb,#7c3aed); color:#fff; font-size:9px; font-weight:700; padding:3px 10px; border-radius:100px; letter-spacing:.06em; text-transform:uppercase; }
        .btn { border:none; border-radius:14px; font-family:'Inter',sans-serif; font-weight:600; cursor:pointer; transition:all .2s; }
        .btn-p { background:linear-gradient(135deg,#2563eb,#1d4ed8); color:#fff; padding:13px 16px; font-size:13px; width:100%; box-shadow:0 6px 20px rgba(37,99,235,.35); }
        .btn-p:active { transform:scale(.97); }
        .btn-sm { padding:7px 14px; font-size:11px; }
        .btn-gh { background:var(--glass); border:1px solid var(--border); color:var(--t1); padding:10px 14px; font-size:12px; }
        .btn-go { background:linear-gradient(135deg,#10b981,#059669); color:#fff; box-shadow:0 4px 12px rgba(16,185,129,.3); }
        .btn-google { background:#fff; color:#1f2937; padding:13px 16px; font-size:13px; width:100%; display:flex; align-items:center; justify-content:center; gap:10px; font-weight:600; box-shadow:0 4px 15px rgba(0,0,0,.3); }
        .g2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
        .div { height:1px; background:var(--border); margin:12px 0; }
        .tag { background:var(--navy3); border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:11px; cursor:pointer; transition:.2s; }
        .tag.sel { border-color:var(--blue2); color:#93c5fd; background:rgba(59,130,246,.1); }
        textarea,input,select { background:var(--navy3); border:1px solid var(--border); border-radius:14px; color:var(--t1); font-family:'Inter',sans-serif; font-size:13px; padding:12px 14px; width:100%; outline:none; transition:.2s; }
        textarea:focus,input:focus,select:focus { border-color:var(--blue2); box-shadow:0 0 0 3px rgba(59,130,246,.18); }
        textarea { resize:none; height:90px; }
        .kpi { padding:14px; border-radius:16px; background:var(--glass); border:1px solid var(--border); }
        .kv { font-family:'Outfit',sans-serif; font-size:22px; font-weight:700; }
        .kl { font-size:10px; color:var(--t3); margin-top:2px; font-weight:500; }
        .bar-wrap { display:flex; align-items:flex-end; gap:8px; height:56px; }
        .bar { flex:1; border-radius:6px 6px 0 0; background:linear-gradient(180deg,#3b82f6,#1d4ed8); opacity:.6; }
        .hcell { height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:rgba(255,255,255,.8); }
        #gps-t { position:absolute; top:-90px; left:16px; right:16px; background:linear-gradient(135deg,#1d4ed8,#3b82f6); color:#fff; padding:14px 16px; border-radius:18px; box-shadow:0 15px 40px rgba(37,99,235,.5); display:flex; align-items:center; gap:12px; z-index:999; transition:top .6s cubic-bezier(.34,1.56,.64,1); }
        #gps-t.show { top:58px; }
        .slbl { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--t3); margin:20px 0 10px; }
        .pdot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
        .pr { background:var(--red); box-shadow:0 0 8px var(--red); }
        .po { background:#f97316; box-shadow:0 0 8px #f97316; }
        .pgr { background:var(--green); box-shadow:0 0 8px var(--green); }
        .hist-i { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
        .hdot { width:10px; height:10px; border-radius:50%; margin-top:3px; flex-shrink:0; }
        .offline { display:inline-flex; align-items:center; gap:6px; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); border-radius:100px; padding:5px 12px; font-size:10px; color:#fca5a5; }
        .mrow { display:flex; justify-content:space-between; align-items:center; padding:9px 0; }
        .mrow+.mrow { border-top:1px solid var(--border); }
        ::-webkit-scrollbar { width:3px; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:10px; }
        .nb2 { width:30px; height:30px; border-radius:9px; background:var(--navy3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--t2); flex-shrink:0; }
        /* ===== CALCULATOR ===== */
        .calc-prod { display:flex; align-items:center; justify-content:space-between; padding:12px; background:var(--navy3); border:1px solid var(--border); border-radius:14px; margin-bottom:10px; }
        .qty-ctrl { display:flex; align-items:center; gap:10px; }
        .qty-btn { width:32px; height:32px; border-radius:10px; border:1px solid var(--border); background:var(--navy2); color:var(--t1); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.2s; }
        .qty-btn:hover { background:var(--blue); border-color:var(--blue2); }
        .qty-val { font-weight:700; font-size:16px; min-width:28px; text-align:center; }
        .calc-total { background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(245,158,11,.04)); border:1px solid rgba(245,158,11,.3); border-radius:16px; padding:14px; margin-top:14px; }
        /* ===== LOGIN ===== */
        #login-screen { position:fixed; inset:0; background:var(--navy); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; }
        .login-logo { font-family:'Outfit',sans-serif; font-size:32px; font-weight:800; text-align:center; line-height:1.1; margin-bottom:8px; }
        .login-logo span { color:var(--blue2); }
        /* Product color dots */
        .prod-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
        .gas20 { background:#3b82f6; }
        .gas6  { background:#8b5cf6; }
        .d110  { background:#f59e0b; }
        .d60   { background:#f97316; }
        .d20   { background:#10b981; }
    </style>
</head>

// ========== NAVIGATION ==========
function showScreen(id, navId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (navId) {
        document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
        document.getElementById(navId).classList.add('active');
    }
}

// ========== LOGIN ==========
function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    if (!email || !pass) { alert('Ingrese correo y contraseña.'); return; }
    // For demo: accept any credentials
    const name = email.split('@')[0].replace(/\./g,' ').split(' ').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
    document.getElementById('usr-name').textContent = name.split(' ')[0];
    document.getElementById('usr-avatar').textContent = name[0].toUpperCase();
    document.getElementById('login-screen').style.display = 'none';
    setTimeout(showGPS, 2000);
}

// ========== GOOGLE IDENTITY SERVICES CALLBACK ==========
function handleGoogleCredential(response) {
    // Decode the JWT credential returned by Google
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const name    = payload.given_name || payload.name || payload.email.split('@')[0];
    const email   = payload.email;
    const picture = payload.picture || '';

    // Populate the app with the real Google account data
    document.getElementById('usr-name').textContent    = name;
    document.getElementById('usr-avatar').textContent  = name[0].toUpperCase();
    document.getElementById('user-label').textContent  = '⛽ ' + email;

    // Show profile picture if available
    const avatar = document.getElementById('usr-avatar');
    if (picture) {
        avatar.style.backgroundImage  = `url(${picture})`;
        avatar.style.backgroundSize   = 'cover';
        avatar.style.backgroundPosition = 'center';
        avatar.textContent = '';
    }

    // Close login and start session
    document.getElementById('login-screen').style.display = 'none';
    setTimeout(showGPS, 2000);
}

function doLogout() {
    if (confirm('¿Cerrar sesión?')) {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('login-email').value = '';
        document.getElementById('login-pass').value = '';
    }
}

// ========== CALCULATOR ==========
const prodList = document.getElementById('products-list');
const qtys = {};
PRODUCTS.forEach(p => {
    qtys[p.id] = 0;
    const div = document.createElement('div');
    div.className = 'calc-prod';
    div.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="prod-dot ${p.dotClass}"></div>
        <div>
          <div style="font-weight:600;font-size:12px;">${p.icon} ${p.name}</div>
          <div class="sub" style="font-size:10px;">$${p.price.toLocaleString('es-CO')} / unidad</div>
        </div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
        <span class="qty-val" id="qty-${p.id}">0</span>
        <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
      </div>`;
    prodList.appendChild(div);
});

function changeQty(id, delta) {
    qtys[id] = Math.max(0, (qtys[id] || 0) + delta);
    document.getElementById('qty-' + id).textContent = qtys[id];
    updateCalcTotal();
}

function updateCalcTotal() {
    let total = 0, units = 0;
    let breakdown = '';
    PRODUCTS.forEach(p => {
        const q = qtys[p.id] || 0;
        if (q > 0) {
            const sub = q * p.price;
            total += sub;
            units += q;
            breakdown += `<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--t2);padding:3px 0;">
              <span>${p.icon} ${p.name} × ${q}</span>
              <span>$${sub.toLocaleString('es-CO')}</span>
            </div>`;
        }
    });
    document.getElementById('calc-total-val').textContent = '$' + total.toLocaleString('es-CO');
    document.getElementById('calc-savings').textContent  = '$' + Math.round(total * 0.08).toLocaleString('es-CO');
    document.getElementById('total-units-badge').textContent = units + ' unidades';
    document.getElementById('calc-breakdown').innerHTML   = breakdown || '<p class="sub" style="font-size:11px;">Seleccione productos para calcular</p>';
}

function updateCalcClient() {
    const key  = document.getElementById('calc-client').value;
    const hint = document.getElementById('client-hist-hint');
    if (key && CLIENT_HIST[key]) {
        document.getElementById('hist-avg').textContent = '$' + CLIENT_HIST[key].avg.toLocaleString('es-CO') + '/mes';
        document.getElementById('hist-sug').textContent = CLIENT_HIST[key].sug;
        hint.style.display = 'block';
    } else {
        hint.style.display = 'none';
    }
}

function sendQuote() {
    const client = document.getElementById('calc-client').value;
    const total  = document.getElementById('calc-total-val').textContent;
    if (!client || total === '$0') { alert('Seleccione un cliente y agregue productos.'); return; }
    alert(`✅ Cotización enviada por correo a ${client}\nTotal: ${total}\n\nEn producción se envía automáticamente vía Gmail API desde xp3meta@rendimax.com.co`);
}

function clearCalc() {
    PRODUCTS.forEach(p => { qtys[p.id] = 0; document.getElementById('qty-' + p.id).textContent = '0'; });
    document.getElementById('calc-client').value = '';
    document.getElementById('client-hist-hint').style.display = 'none';
    updateCalcTotal();
}
